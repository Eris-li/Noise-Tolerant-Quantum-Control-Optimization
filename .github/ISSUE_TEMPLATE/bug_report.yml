name: Bug report
description: Report a reproducible code, test, or documentation problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, notebook cells, or artifact paths.
      placeholder: |
        python -m unittest discover -s tests -v
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: git rev-parse --short HEAD
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, dependency versions, and whether submodules were initialized.
