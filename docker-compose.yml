x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /workspace
  environment:
    MPLCONFIGDIR: /tmp/matplotlib
  volumes:
    - ./:/workspace

services:
  test:
    <<: *app
    command: bash -lc "python scripts/build_rydcalc_extension.py && python -m unittest discover -s tests -v"

  smoke-uv-edge:
    <<: *app
    command: bash -lc "python experiments/scan_yb171_uv_edge_effect.py --smoke"

  dev:
    <<: *app
    command: bash -lc "python scripts/build_rydcalc_extension.py && exec bash"
    stdin_open: true
    tty: true
