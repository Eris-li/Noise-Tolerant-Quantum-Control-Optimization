x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /workspace
  environment:
    MPLCONFIGDIR: /tmp/matplotlib
  volumes:
    - ./:/workspace

services:
  test:
    <<: *app
    command: bash -lc "python scripts/build_rydcalc_extension.py && python -m unittest discover -s tests -v"

  smoke-v4:
    <<: *app
    command: bash -lc "python scripts/build_rydcalc_extension.py && python experiments/run_two_photon_cz_v4_open_system_smoke.py"

  dev:
    <<: *app
    command: bash -lc "python scripts/build_rydcalc_extension.py && exec bash"
    stdin_open: true
    tty: true
